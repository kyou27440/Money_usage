<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- App Icon Card Body -->
  <rect width="512" height="512" rx="115" fill="url(#bgGrad)" />
  <!-- Inner Subtle Border -->
  <rect x="12" y="12" width="488" height="488" rx="103" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="6"/>
  <!-- Golf & Dues Emblem -->
  <g filter="url(#glow)" transform="translate(256, 256) scale(2.2)">
    <text text-anchor="middle" dominant-baseline="central" font-size="90" y="4">⛳</text>
  </g>
</svg>
