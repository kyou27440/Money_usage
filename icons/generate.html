<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:40px;text-align:center">
<h2>PWA 아이콘 생성기</h2>
<p>아래 버튼을 클릭하면 192x192, 512x512 PNG 아이콘이 다운로드됩니다.</p>
<canvas id="c" width="512" height="512" style="border:1px solid #333;max-width:256px"></canvas>
<br><br>
<button onclick="download(192)" style="padding:10px 20px;font-size:16px;cursor:pointer">📥 192x192 다운로드</button>
<button onclick="download(512)" style="padding:10px 20px;font-size:16px;cursor:pointer">📥 512x512 다운로드</button>

<script>
function drawIcon(ctx, s) {
    // Background
    const bgGrad = ctx.createLinearGradient(0,0,s,s);
    bgGrad.addColorStop(0,'#0d1220');
    bgGrad.addColorStop(1,'#111827');
    const r = s*0.1875;
    ctx.beginPath();
    ctx.moveTo(r,0);ctx.lineTo(s-r,0);ctx.quadraticCurveTo(s,0,s,r);
    ctx.lineTo(s,s-r);ctx.quadraticCurveTo(s,s,s-r,s);
    ctx.lineTo(r,s);ctx.quadraticCurveTo(0,s,0,s-r);
    ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);
    ctx.closePath();ctx.fillStyle=bgGrad;ctx.fill();

    // Glow circle
    const glow = ctx.createRadialGradient(s/2,s*0.47,0,s/2,s*0.47,s*0.25);
    glow.addColorStop(0,'rgba(99,102,241,0.25)');
    glow.addColorStop(1,'rgba(99,102,241,0)');
    ctx.fillStyle=glow;
    ctx.beginPath();ctx.arc(s/2,s*0.47,s*0.23,0,Math.PI*2);ctx.fill();

    // Ring
    const ringGrad = ctx.createLinearGradient(s*0.3,s*0.3,s*0.7,s*0.6);
    ringGrad.addColorStop(0,'#6366f1');
    ringGrad.addColorStop(1,'#8b5cf6');
    ctx.strokeStyle=ringGrad;ctx.lineWidth=s*0.012;
    ctx.beginPath();ctx.arc(s/2,s*0.47,s*0.17,0,Math.PI*2);ctx.stroke();

    // ₫ symbol
    ctx.fillStyle='#818cf8';
    ctx.font=`bold ${s*0.19}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('₫',s/2,s*0.48);

    // Chart line
    ctx.strokeStyle='#10b981';ctx.lineWidth=s*0.012;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();
    ctx.moveTo(s*0.31,s*0.7);ctx.lineTo(s*0.41,s*0.66);ctx.lineTo(s*0.51,s*0.6);
    ctx.lineTo(s*0.61,s*0.64);ctx.lineTo(s*0.7,s*0.56);ctx.stroke();
    ctx.fillStyle='#10b981';
    ctx.beginPath();ctx.arc(s*0.7,s*0.56,s*0.012,0,Math.PI*2);ctx.fill();

    // MONY text
    ctx.fillStyle='#f0f2f5';
    ctx.font=`bold ${s*0.082}px Arial`;ctx.letterSpacing=`${s*0.008}px`;
    ctx.fillText('MONY',s/2,s*0.86);
}

const c=document.getElementById('c');
drawIcon(c.getContext('2d'),512);

function download(size){
    const tc=document.createElement('canvas');tc.width=size;tc.height=size;
    drawIcon(tc.getContext('2d'),size);
    const a=document.createElement('a');
    a.download=`icon-${size}.png`;a.href=tc.toDataURL('image/png');a.click();
}
</script>
</body>
</html>
